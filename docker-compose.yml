services:
  backend:
    build:
      context: ./backend
    image: iot-room-monitor-backend
    container_name: IoT-RoomMonitor-backend
    depends_on:
      influxdb:
        condition: service_healthy
      mosquitto:
        condition: service_started # app has retry logic for MQTT connection
    ports:
      - 3000:3000
    volumes:
      - sqlite-data:/app/data
    environment:
      BACKEND_PORT: 3000
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_ORG: ${DOCKER_INFLUXDB_INIT_ORG}
      INFLUXDB_BUCKET: ${DOCKER_INFLUXDB_INIT_BUCKET}
      INFLUXDB_DATA_RETENTION: ${DOCKER_INFLUXDB_INIT_RETENTION}

      INFLUXDB_BACKEND_TOKEN: ${INFLUXDB_BACKEND_TOKEN}

      MQTT_BROKER_URL: mqtt://mosquitto:1883
      SQLITE_PATH: /app/data/app.db

  influxdb:
    image: influxdb:2.7
    container_name: IoT-RoomMonitor-influxdb
    ports:
      - 8086:8086
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${DOCKER_INFLUXDB_INIT_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${DOCKER_INFLUXDB_INIT_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${DOCKER_INFLUXDB_INIT_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${DOCKER_INFLUXDB_INIT_BUCKET}
      DOCKER_INFLUXDB_INIT_RETENTION: ${DOCKER_INFLUXDB_INIT_RETENTION:-720h}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: IoT-RoomMonitor-mosquitto
    ports:
      - 1883:1883
    volumes:
      - ./mosquitto:/mosquitto/config/

volumes:
  influxdb-data:
  sqlite-data:
